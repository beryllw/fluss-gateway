# Docker Compose for production deployment of Fluss Gateway
# Connects to an external Fluss cluster (not managed by this file).
#
# Usage:
#   FLUSS_COORDINATOR=fluss-coordinator:9123 docker compose -f deploy/docker/docker-compose.prod.yml up -d
#
# Environment variables:
#   FLUSS_COORDINATOR - Fluss coordinator address (required)
#   GATEWAY_PORT      - Gateway port (default: 8080)
#   LOG_LEVEL         - Log level (default: info)

services:
  gateway:
    build:
      context: ../..
      dockerfile: ./deploy/docker/Dockerfile
    image: fluss-gateway:latest
    restart: unless-stopped
    environment:
      - RUST_LOG=fluss_gateway=${LOG_LEVEL:-info}
    command:
      - --host=0.0.0.0
      - --port=${GATEWAY_PORT:-8080}
      - --fluss-coordinator=${FLUSS_COORDINATOR}
    ports:
      - "${GATEWAY_PORT:-8080}:${GATEWAY_PORT:-8080}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${GATEWAY_PORT:-8080}/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
