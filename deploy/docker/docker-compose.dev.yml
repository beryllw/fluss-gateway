# Docker Compose for Fluss Gateway integration testing
#
# This file only starts the Fluss cluster. The Gateway should be run locally
# (see below) because fluss-rust is a local path dependency that cannot be
# built inside Docker.
#
# Usage (from project root):
#   1. Start Fluss cluster:
#      docker compose -f deploy/docker/docker-compose.dev.yml up -d
#
#   2. Build and run Gateway locally:
#      cargo run --release -- --host=0.0.0.0 --port=8080 --fluss-coordinator=localhost:9123
#
#   3. Run integration tests:
#      cargo test --test integration
#
# Ports:
#   9123 - Fluss Coordinator
#   9124 - Fluss Tablet Server
#   2181 - ZooKeeper

services:
  zookeeper:
    image: zookeeper:3.9.2
    restart: unless-stopped
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  coordinator-server:
    image: apache/fluss:0.9.0-incubating
    command: coordinatorServer
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      - |
        FLUSS_PROPERTIES=
        zookeeper.address: zookeeper:2181
        bind.listeners: FLUSS://0.0.0.0:9333,CLIENT://0.0.0.0:9123
        advertised.listeners: FLUSS://coordinator-server:9333,CLIENT://localhost:9123
    ports:
      - "9123:9123"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/9123"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 15s

  tablet-server:
    image: apache/fluss:0.9.0-incubating
    command: tabletServer
    restart: unless-stopped
    depends_on:
      coordinator-server:
        condition: service_healthy
    environment:
      - |
        FLUSS_PROPERTIES=
        zookeeper.address: zookeeper:2181
        bind.listeners: FLUSS://0.0.0.0:9333,CLIENT://0.0.0.0:9123
        advertised.listeners: FLUSS://tablet-server:9333,CLIENT://localhost:9124
        tablet-server.id: 0
        kv.snapshot.interval: 0s
    ports:
      - "9124:9123"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/9123"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 15s
