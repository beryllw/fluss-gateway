# Docker Compose for Fluss Gateway — ready-to-use test environment.
#
# Other projects can use this to spin up a complete Fluss cluster
# with the Gateway REST API in a single command.
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   docker compose -f docker-compose.test.yml down
#
# Exposed ports:
#   8080 - Gateway REST API
#   9123 - Fluss Coordinator (CLIENT)
#   9124 - Fluss Tablet Server (CLIENT)
#   2181 - ZooKeeper
#
# Gateway defaults: auth-type=none, no config needed.
# For custom auth, override GATEWAY_ARGS environment variable.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  zookeeper:
    image: zookeeper:3.9.2
    restart: unless-stopped
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    logging: *default-logging

  coordinator-server:
    image: apache/fluss:0.9.0-incubating
    command: coordinatorServer
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      - |
        FLUSS_PROPERTIES=
        zookeeper.address: zookeeper:2181
        bind.listeners: FLUSS://0.0.0.0:9333,CLIENT://0.0.0.0:9123
        advertised.listeners: FLUSS://coordinator-server:9333,CLIENT://localhost:9123
    ports:
      - "9123:9123"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/9123"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 15s
    logging: *default-logging

  tablet-server:
    image: apache/fluss:0.9.0-incubating
    command: tabletServer
    restart: unless-stopped
    depends_on:
      coordinator-server:
        condition: service_healthy
    environment:
      - |
        FLUSS_PROPERTIES=
        zookeeper.address: zookeeper:2181
        bind.listeners: FLUSS://0.0.0.0:9333,CLIENT://0.0.0.0:9123
        advertised.listeners: FLUSS://tablet-server:9333,CLIENT://localhost:9124
        tablet-server.id: 0
        kv.snapshot.interval: 0s
    ports:
      - "9124:9123"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/9123"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 15s
    logging: *default-logging

  gateway:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.build
      platforms:
        - linux/amd64
    restart: unless-stopped
    depends_on:
      coordinator-server:
        condition: service_healthy
      tablet-server:
        condition: service_healthy
    environment:
      - GATEWAY_ARGS=--host=0.0.0.0 --port=8080 --fluss-coordinator=coordinator-server:9123 --auth-type=none
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    logging: *default-logging
